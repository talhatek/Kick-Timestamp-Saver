<!DOCTYPE html>
<html>
<head>
<style>
    body {
      width: 320px;
      padding: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1b1b1b;
      color: #ffffff;
    }
    h3 {
      text-align: center;
      color: #53fc18;
      margin-top: 5px;
    }
    p.hint {
      text-align: center;
      font-size: 11px;
      color: #aaaaaa;
      margin-bottom: 15px;
    }
    button#save-btn {
      width: 100%;
      padding: 10px;
      background-color: #53fc18;
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }
    button#save-btn:hover { background-color: #45e012; }
    ul { list-style-type: none; padding: 0; margin: 0; }
    li {
      background-color: #2b2b2b;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .info { width: 85%; }
    .delete-btn {
      background-color: #ff4c4c;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: bold;
    }
    .delete-btn:hover { background-color: #cc0000; }
    a { color: #53fc18; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h3>Kick Timestamps</h3>
  <div style="background-color: #2b2b2b; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center;">
    <label style="cursor: pointer; font-weight: bold; font-size: 14px;">
      <input type="checkbox" id="autosave-toggle" style="cursor: pointer;"> 
      Enable Auto-Save (Every 15s)
    </label>
  </div>
  <button id="save-btn">Save Current Time</button>
  <ul id="saved-list"></ul>

  <script src="popup.js"></script>
</body>
</html>
